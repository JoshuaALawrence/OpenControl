name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-and-release:
    name: Build and Create Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Extract version
        id: version
        run: |
          $version = "${{ github.ref }}" -replace "refs/tags/v", ""
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "Release version: $version"

      - name: Build release binary
        run: cargo build --release

      - name: Create release notes
        id: release_notes
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $file = "target/release/OpenControl.exe"
          $size = (Get-Item $file).Length / 1MB

          # Pull this version's notes straight from CHANGELOG.md (fallback to a link)
          $changes = "See [CHANGELOG.md](./CHANGELOG.md) for detailed changes"
          if (Test-Path "CHANGELOG.md") {
            $raw = Get-Content "CHANGELOG.md" -Raw
            $escaped = [regex]::Escape($version)
            $pattern = "(?ms)^##\s*\[$escaped\][^\r\n]*\r?\n(.*?)(?=^##\s*\[|\z)"
            $m = [regex]::Match($raw, $pattern)
            if ($m.Success) {
              $body = ($m.Groups[1].Value -split '\r?\n' |
                Where-Object { $_ -notmatch '^\s*\[[^\]]+\]:\s*https?://' }) -join "`n"
              $body = ($body -replace '(?m)^### ', '#### ').Trim()
              if ($body) { $changes = $body }
            }
          }

          $notes = @"
          ## OpenControl v$version
          
          An all-Rust Model Context Protocol server for Windows desktop control.
          
          ### What's New

          $changes

          ### Downloads
          - **OpenControl.exe** (Size: $($size.ToString('F2')) MB)
          
          ### System Requirements
          - Windows 10/11 with latest updates
          - Modern CPU with SSE2 support
          
          ### Installation
          1. Download OpenControl.exe
          2. Add to your MCP server list in Claude Desktop, VS Code, or your preferred MCP client
          3. Update mcp.json with path to the binary
          
          ### Usage
          See [README.md](./README.md) for full documentation.
          "@
          
          echo "RELEASE_NOTES<<EOF" >> $env:GITHUB_OUTPUT
          echo $notes >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref }}
          name: OpenControl ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
          files: target/release/OpenControl.exe

      - name: Verify release assets
        run: |
          $exe = "target/release/OpenControl.exe"
          if (Test-Path $exe) {
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "✓ Release binary ready: $($size.ToString('F2')) MB"
          }

  publish-to-crates-io:
    name: Publish to crates.io
    runs-on: windows-latest
    needs: build-and-release
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check publish settings
        run: |
          $toml = Get-Content "Cargo.toml" -Raw
          if ($toml -match 'publish\s*=\s*false') {
            Write-Host "✓ Crate configured with publish = false"
            Write-Host "  (Skipping publish.rs as intended for binary distribution)"
            exit 0
          }

      - name: Publish to crates.io
        continue-on-error: true
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-release-branch:
    name: Update Release Branch
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          VERSION=$(echo ${{ github.ref }} | sed 's/refs\/tags\/v//')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create or update release branch
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git checkout -B release/${{ steps.version.outputs.VERSION }}
          git push -f origin release/${{ steps.version.outputs.VERSION }}
          
          echo "✓ Release branch created: release/${{ steps.version.outputs.VERSION }}"
