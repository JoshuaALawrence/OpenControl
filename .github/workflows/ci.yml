name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Least privilege by default: every job here only reads the repository.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --release --all-features

  clippy:
    name: Clippy
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Run clippy
        run: cargo clippy --release --all-features -- -D warnings

  dead-code:
    name: Dead Code Check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check for dead code
        run: cargo check --all-targets --release
        env:
          RUSTFLAGS: -D dead_code

  fmt:
    name: Rustfmt
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  build:
    name: Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Verify binary exists
        run: |
          $exe = "target\release\OpenControl.exe"
          if (Test-Path $exe) {
            Write-Host "✓ Binary exists: $exe"
            $size = (Get-Item $exe).Length / 1MB
            Write-Host "  Size: $($size.ToString('F2')) MB"
          } else {
            Write-Host "✗ Binary not found: $exe"
            exit 1
          }

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenControl-${{ runner.os }}
          path: target/release/OpenControl.exe
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build integration tests
        run: cargo test --release --test integration_test --no-run

      - name: Run integration tests
        run: cargo test --release --test integration_test
        timeout-minutes: 5
        continue-on-error: true

  security-audit:
    name: Security Audit
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit
